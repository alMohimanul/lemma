[mypy]
python_version = 3.10
warn_return_any = True
warn_unused_configs = True
disallow_untyped_defs = False
ignore_missing_imports = True

# SQLAlchemy generates dynamic base classes
[mypy-MAVYN.db.models]
ignore_errors = True

# CLI has dynamic Paper iteration
[mypy-MAVYN.cli.commands]
ignore_errors = True

# Repository has dynamic path handling
[mypy-MAVYN.db.repository]
ignore_errors = True

# LLM modules use dynamic JSON and provider dispatch
[mypy-MAVYN.llm.*]
ignore_errors = True
